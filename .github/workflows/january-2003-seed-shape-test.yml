name: Bootstrap January 2003 seed shape implementation

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.head_ref == 'agent/reconcile-january-2003-seed-shape' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/reconcile-january-2003-seed-shape
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Keep workflow update outside the GitHub App push
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/test_january_2003_seed_shape.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '    (ROOT / ".github/workflows/january-2003-seed-shape-test.yml").write_text(FINAL_WORKFLOW, encoding="utf-8")\n',
              '',
          )
          text = text.replace(
              '        ".github/workflows/january-2003-seed-shape-test.yml",\n',
              '',
          )
          path.write_text(text, encoding='utf-8')
          PY
      - name: Apply, validate and commit bounded implementation
        shell: bash
        run: |
          set +e
          python scripts/test_january_2003_seed_shape.py --bootstrap > bootstrap.log 2>&1
          status=$?
          cat bootstrap.log
          exit "$status"
      - name: Upload bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: january-2003-seed-shape-bootstrap-log
          path: bootstrap.log
          if-no-files-found: warn
