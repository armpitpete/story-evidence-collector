name: Jeremy Corbyn current Parliament Early Day Motions source inventory test

on:
  pull_request:
    paths:
      - "research/complete-mp-reports/jeremy-corbyn/current-parliament-early-day-motions-source-inventory-v1.json"
      - "docs/jeremy-corbyn-current-parliament-early-day-motions-source-note-v1.md"
      - "scripts/test_jeremy_corbyn_current_parliament_early_day_motions_source_inventory_v1.py"
      - ".github/workflows/jeremy-corbyn-current-parliament-early-day-motions-source-inventory-test.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-source-inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact pull-request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile deterministic regression
        run: python -m py_compile scripts/test_jeremy_corbyn_current_parliament_early_day_motions_source_inventory_v1.py

      - name: Validate fixed inventory and checksums
        run: python scripts/test_jeremy_corbyn_current_parliament_early_day_motions_source_inventory_v1.py

      - name: Capture official source diagnostics
        shell: bash
        run: |
          query_url="$(python -c 'import json; print(json.load(open("research/complete-mp-reports/jeremy-corbyn/current-parliament-early-day-motions-source-inventory-v1.json"))["capture"]["query"]["official_url"])')"
          lda_url='https://lda.data.parliament.uk/edmsignatures.json?member=http%3A%2F%2Fdata.parliament.uk%2Fmembers%2F185&isPrimarySponsor=true&isSponsor=false&max-dateSigned=2026-07-22&min-dateSigned=2024-07-04&_pageSize=500'
          members_url='https://members-api.parliament.uk/api/Members/185/Edms?page=1'
          motions_url='https://oralquestionsandmotions-api.parliament.uk/EarlyDayMotions/list?parameters.memberId=185&parameters.includeSponsoredByMember=false&parameters.tabledStartDate=2024-07-04&parameters.tabledEndDate=2026-07-22&parameters.statuses=Published&parameters.statuses=Withdrawn&parameters.skip=0&parameters.take=100'
          detail_url='https://oralquestionsandmotions-api.parliament.uk/EarlyDayMotion/66149'
          set +e
          curl --silent --show-error --location \
            --user-agent "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36" \
            --header "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            --header "Accept-Language: en-GB,en;q=0.9" \
            --dump-header /tmp/edm-live-result-headers.txt \
            --output /tmp/edm-live-result-page.html \
            --write-out '%{http_code}\n' \
            "$query_url" > /tmp/edm-live-result-status.txt
          printf 'curl_exit=%s\n' "$?" >> /tmp/edm-live-result-status.txt
          curl --silent --show-error --location --header "Accept: application/json" \
            --dump-header /tmp/edm-lda-headers.txt --output /tmp/edm-lda.json --write-out '%{http_code}\n' \
            "$lda_url" > /tmp/edm-lda-status.txt
          printf 'curl_exit=%s\n' "$?" >> /tmp/edm-lda-status.txt
          curl --silent --show-error --location --header "Accept: application/json" \
            --dump-header /tmp/edm-members-api-headers.txt --output /tmp/edm-members-api.json --write-out '%{http_code}\n' \
            "$members_url" > /tmp/edm-members-api-status.txt
          printf 'curl_exit=%s\n' "$?" >> /tmp/edm-members-api-status.txt
          curl --silent --show-error --location --header "Accept: application/json" \
            --dump-header /tmp/edm-motions-api-headers.txt --output /tmp/edm-motions-api.json --write-out '%{http_code}\n' \
            "$motions_url" > /tmp/edm-motions-api-status.txt
          printf 'curl_exit=%s\n' "$?" >> /tmp/edm-motions-api-status.txt
          curl --silent --show-error --location --header "Accept: application/json" \
            --dump-header /tmp/edm-motion-detail-headers.txt --output /tmp/edm-motion-detail.json --write-out '%{http_code}\n' \
            "$detail_url" > /tmp/edm-motion-detail-status.txt
          printf 'curl_exit=%s\n' "$?" >> /tmp/edm-motion-detail-status.txt
          exit 0

      - name: Replay official UK Parliament source interface
        id: live
        shell: bash
        run: |
          set -o pipefail
          python scripts/test_jeremy_corbyn_current_parliament_early_day_motions_source_inventory_v1.py --live 2>&1 | tee /tmp/edm-live.log

      - name: Upload live-source diagnostic on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edm-live-diagnostic
          path: |
            /tmp/edm-live.log
            /tmp/edm-live-result-page.html
            /tmp/edm-live-result-headers.txt
            /tmp/edm-live-result-status.txt
            /tmp/edm-lda.json
            /tmp/edm-lda-headers.txt
            /tmp/edm-lda-status.txt
            /tmp/edm-members-api.json
            /tmp/edm-members-api-headers.txt
            /tmp/edm-members-api-status.txt
            /tmp/edm-motions-api.json
            /tmp/edm-motions-api-headers.txt
            /tmp/edm-motions-api-status.txt
            /tmp/edm-motion-detail.json
            /tmp/edm-motion-detail-headers.txt
            /tmp/edm-motion-detail-status.txt

      - name: Enforce exact four-file scope
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          git diff --name-only origin/main...HEAD | sort > /tmp/actual-files.txt
          cat > /tmp/expected-files.txt <<'EOF'
          .github/workflows/jeremy-corbyn-current-parliament-early-day-motions-source-inventory-test.yml
          docs/jeremy-corbyn-current-parliament-early-day-motions-source-note-v1.md
          research/complete-mp-reports/jeremy-corbyn/current-parliament-early-day-motions-source-inventory-v1.json
          scripts/test_jeremy_corbyn_current_parliament_early_day_motions_source_inventory_v1.py
          EOF
          diff -u /tmp/expected-files.txt /tmp/actual-files.txt
          git diff --check origin/main...HEAD
