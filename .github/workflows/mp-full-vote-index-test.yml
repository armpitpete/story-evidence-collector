name: MP full vote index test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-mp-full-vote-index:
    name: Run MP full vote index
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run MP full vote index
        run: python build_mp_full_vote_index_v13.py

      - name: Upload MP full vote index report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mp-full-vote-index-report
          path: |
            mp_full_vote_query.json
            mp_full_vote_index_v13.json
            mp_full_vote_index_v13.md
            mp_vote_index_source_report_v13.md
          if-no-files-found: warn
