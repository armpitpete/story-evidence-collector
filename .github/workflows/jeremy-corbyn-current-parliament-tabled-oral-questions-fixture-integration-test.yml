name: Jeremy Corbyn current-Parliament tabled oral questions fixture integration test

on:
  pull_request:
    paths:
      - "fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json"
      - "scripts/test_jeremy_corbyn_current_parliament_tabled_oral_questions_fixture_integration_v1.py"
      - ".github/workflows/jeremy-corbyn-current-parliament-tabled-oral-questions-fixture-integration-test.yml"

permissions:
  contents: write

jobs:
  validate-fixture-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact pull-request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine authorised integration phase
        id: scope
        shell: bash
        env:
          AUTHORISED_BASE_SHA: 40ad51d0f1e9f999b9731323dfb0600101046c5d
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          test "$EVENT_BASE_SHA" = "$AUTHORISED_BASE_SHA"
          git fetch origin main --depth=1
          actual="$(git diff --name-only origin/main...HEAD | sort)"
          bootstrap_expected="$(printf '%s\n' \
            .github/workflows/jeremy-corbyn-current-parliament-tabled-oral-questions-fixture-integration-test.yml \
            scripts/test_jeremy_corbyn_current_parliament_tabled_oral_questions_fixture_integration_v1.py | sort)"
          final_expected="$(printf '%s\n' \
            .github/workflows/jeremy-corbyn-current-parliament-tabled-oral-questions-fixture-integration-test.yml \
            fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json \
            scripts/test_jeremy_corbyn_current_parliament_tabled_oral_questions_fixture_integration_v1.py | sort)"
          printf '%s\n' "Evaluated base: $EVENT_BASE_SHA"
          printf '%s\n' "Evaluated changed files:" "$actual"
          if [ "$actual" = "$bootstrap_expected" ]; then
            echo "mode=bootstrap" >> "$GITHUB_OUTPUT"
          elif [ "$actual" = "$final_expected" ]; then
            echo "mode=final" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "FAIL — unauthorised oral-question fixture scope"
            exit 1
          fi

      - name: Compile dedicated and preserved regressions
        run: |
          python -m py_compile scripts/test_jeremy_corbyn_current_parliament_tabled_oral_questions_fixture_integration_v1.py
          python -m py_compile scripts/test_jeremy_corbyn_current_parliament_tabled_oral_questions_source_inventory_v1.py
          python -m py_compile scripts/test_jeremy_corbyn_current_parliament_tabled_oral_questions_source_interface_v1.py

      - name: Build deterministic authorised fixture artifact
        run: |
          python scripts/test_jeremy_corbyn_current_parliament_tabled_oral_questions_fixture_integration_v1.py \
            --build-output /tmp/oral-question-fixture/jeremy-corbyn-fixture-v1.json

      - name: Upload deterministic fixture artifact
        uses: actions/upload-artifact@v4
        with:
          name: jeremy-corbyn-tabled-oral-questions-fixture
          path: /tmp/oral-question-fixture/jeremy-corbyn-fixture-v1.json
          if-no-files-found: error
          retention-days: 1

      - name: Commit only the deterministic fixture on the controlled bootstrap branch
        if: steps.scope.outputs.mode == 'bootstrap'
        shell: bash
        env:
          EXPECTED_EVENT_HEAD: ${{ github.event.pull_request.head.sha }}
          EXPECTED_BRANCH: agent/integrate-corbyn-tabled-oral-questions-fixture
          EVENT_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          test "$EVENT_BRANCH" = "$EXPECTED_BRANCH"
          test "$(git rev-parse HEAD)" = "$EXPECTED_EVENT_HEAD"
          cp /tmp/oral-question-fixture/jeremy-corbyn-fixture-v1.json \
            fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json
          git diff --name-only | sort > /tmp/actual-worktree-files.txt
          printf '%s\n' fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json > /tmp/expected-worktree-files.txt
          diff -u /tmp/expected-worktree-files.txt /tmp/actual-worktree-files.txt
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json
          git diff --cached --name-only | sort > /tmp/actual-staged-files.txt
          diff -u /tmp/expected-worktree-files.txt /tmp/actual-staged-files.txt
          git commit -m "Integrate Corbyn tabled oral question facts"
          git push origin "HEAD:$EVENT_BRANCH"

      - name: Compare committed fixture with deterministic build
        if: steps.scope.outputs.mode == 'final'
        run: cmp /tmp/oral-question-fixture/jeremy-corbyn-fixture-v1.json fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json

      - name: Validate neutral oral-question fixture integration
        if: steps.scope.outputs.mode == 'final'
        run: python scripts/test_jeremy_corbyn_current_parliament_tabled_oral_questions_fixture_integration_v1.py

      - name: Preserve fixed oral-question inventory
        if: steps.scope.outputs.mode == 'final'
        run: python scripts/test_jeremy_corbyn_current_parliament_tabled_oral_questions_source_inventory_v1.py

      - name: Preserve oral-question source-interface proof
        if: steps.scope.outputs.mode == 'final'
        run: python scripts/test_jeremy_corbyn_current_parliament_tabled_oral_questions_source_interface_v1.py

      - name: Run Complete MP Report fixture regression
        if: steps.scope.outputs.mode == 'final'
        run: python scripts/test_complete_mp_report_generator.py

      - name: Run Complete MP Portfolio view regression
        if: steps.scope.outputs.mode == 'final'
        run: python scripts/test_complete_mp_portfolio_view.py

      - name: Enforce clean exact diff
        if: steps.scope.outputs.mode == 'final'
        run: git diff --check origin/main...HEAD
