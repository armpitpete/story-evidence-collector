name: Bootstrap January 2003 seed shape implementation

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.head_ref == 'agent/reconcile-january-2003-seed-shape' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/reconcile-january-2003-seed-shape
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply, validate and commit bounded implementation
        shell: bash
        run: |
          set +e
          python scripts/test_january_2003_seed_shape.py --bootstrap > bootstrap.log 2>&1
          status=$?
          cat bootstrap.log
          exit "$status"
      - name: Upload bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: january-2003-seed-shape-bootstrap-log
          path: bootstrap.log
          if-no-files-found: warn
