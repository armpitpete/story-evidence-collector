name: Temporary server inventory validation

on:
  pull_request:
    paths:
      - "server_imports/audit_server_state.py"
      - ".github/workflows/temporary-server-inventory-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile audit script
        run: python -m py_compile server_imports/audit_server_state.py
      - name: Run read-only missing-path smoke test
        shell: bash
        run: |
          tmp="$(mktemp -d)"
          python server_imports/audit_server_state.py \
            --archive-root "$tmp/missing-archive" \
            --repo-root "$tmp/missing-repo" \
            --format json > "$tmp/report.json"
          python - "$tmp/report.json" <<'PY'
          import json, sys
          report = json.load(open(sys.argv[1], encoding="utf-8"))
          assert report["audit"]["mode"] == "read_only"
          assert report["audit"]["network_access_used"] is False
          assert report["audit"]["archive_modified"] is False
          assert report["audit"]["database_modified"] is False
          assert report["archive_root"]["exists"] is False
          assert report["repo_root"]["exists"] is False
          print("PASS: compile and read-only smoke test")
          PY
