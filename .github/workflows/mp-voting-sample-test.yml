name: MP voting sample test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-mp-voting-sample:
    name: Run MP voting sample report
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run MP voting sample report
        run: python build_mp_voting_positions_v1.py

      - name: Upload MP voting report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mp-voting-positions-report
          path: |
            mp_query.json
            division_records_sample.json
            mp_voting_positions_v1.json
            mp_voting_positions_v1.md
          if-no-files-found: warn
