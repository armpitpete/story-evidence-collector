name: Jeremy Corbyn roles and committees test

on:
  pull_request:
    paths:
      - "research/complete-mp-reports/jeremy-corbyn/roles-and-committees-v1.json"
      - "docs/jeremy-corbyn-roles-committees-source-note-v1.md"
      - "fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json"
      - "scripts/test_jeremy_corbyn_roles_committees_v1.py"
      - ".github/workflows/jeremy-corbyn-roles-committees-test.yml"
      - "schemas/complete-mp-report-v1.schema.json"
      - "scripts/generate_complete_mp_report.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile lane regression
        run: python -m py_compile scripts/test_jeremy_corbyn_roles_committees_v1.py

      - name: Validate official roles and committees baseline
        run: python scripts/test_jeremy_corbyn_roles_committees_v1.py

      - name: Preserve official identity and career baseline
        run: python scripts/test_jeremy_corbyn_identity_career_v1.py

      - name: Preserve canonical Complete MP Report regression
        run: python scripts/test_complete_mp_report_generator.py
