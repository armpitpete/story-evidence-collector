name: Jeremy Corbyn current outside work and company links test

on:
  pull_request:
    paths:
      - "research/complete-mp-reports/jeremy-corbyn/current-outside-work-company-links-v1.json"
      - "docs/jeremy-corbyn-current-outside-work-company-links-source-note-v1.md"
      - "fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json"
      - "scripts/test_jeremy_corbyn_current_outside_work_company_links_v1.py"
      - ".github/workflows/jeremy-corbyn-current-outside-work-company-links-test.yml"
      - "schemas/complete-mp-report-v1.schema.json"
      - "scripts/generate_complete_mp_report.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile outside-work company-links regression
        run: python -m py_compile scripts/test_jeremy_corbyn_current_outside_work_company_links_v1.py

      - name: Validate outside-work company-links baseline
        run: python scripts/test_jeremy_corbyn_current_outside_work_company_links_v1.py

      - name: Preserve identity and career baseline
        run: python scripts/test_jeremy_corbyn_identity_career_v1.py

      - name: Preserve roles and committees baseline
        run: python scripts/test_jeremy_corbyn_roles_committees_v1.py

      - name: Preserve current financial interests baseline
        run: python scripts/test_jeremy_corbyn_current_financial_interests_v1.py

      - name: Preserve canonical Complete MP Report regression
        run: python scripts/test_complete_mp_report_generator.py

      - name: Preserve read-only Complete MP Portfolio view
        run: python scripts/test_complete_mp_portfolio_view.py
