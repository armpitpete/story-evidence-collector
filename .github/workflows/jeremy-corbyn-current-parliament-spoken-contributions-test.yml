name: Jeremy Corbyn current Parliament spoken contributions test

on:
  pull_request:
    paths:
      - "research/complete-mp-reports/jeremy-corbyn/current-parliament-spoken-contributions-v1.json"
      - "docs/jeremy-corbyn-current-parliament-spoken-contributions-source-note-v1.md"
      - "fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json"
      - "scripts/test_jeremy_corbyn_current_parliament_spoken_contributions_v1.py"
      - ".github/workflows/jeremy-corbyn-current-parliament-spoken-contributions-test.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spoken-contributions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact implementation head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile regression
        run: python -m py_compile scripts/test_jeremy_corbyn_current_parliament_spoken_contributions_v1.py

      - name: Verify fixed spoken-contributions baseline
        run: python scripts/test_jeremy_corbyn_current_parliament_spoken_contributions_v1.py

      - name: Verify preserved written-question baseline
        run: python scripts/test_jeremy_corbyn_current_parliament_written_questions_v1.py

      - name: Verify exact implementation scope
        env:
          PR_NUMBER: ${{ github.event.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch origin main
          actual="$(git diff --name-only origin/main...HEAD | sort)"
          original_expected="$(printf '%s\n' \
            .github/workflows/jeremy-corbyn-current-parliament-spoken-contributions-test.yml \
            docs/jeremy-corbyn-current-parliament-spoken-contributions-source-note-v1.md \
            fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json \
            research/complete-mp-reports/jeremy-corbyn/current-parliament-spoken-contributions-v1.json \
            scripts/test_jeremy_corbyn_current_parliament_spoken_contributions_v1.py | sort)"
          authorised_repair_expected="scripts/test_jeremy_corbyn_current_parliament_spoken_contributions_v1.py"
          authorised_pr204_expected="$(printf '%s\n' \
            .github/workflows/jeremy-corbyn-current-parliament-commitments-public-positions-test.yml \
            docs/jeremy-corbyn-current-parliament-commitments-and-public-positions-source-note-v1.md \
            fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json \
            research/complete-mp-reports/jeremy-corbyn/current-parliament-commitments-and-public-positions-v1.json \
            scripts/test_jeremy_corbyn_current_parliament_commitments_and_public_positions_v1.py | sort)"
          authorised_pr220_expected="$(printf '%s\n' \
            .github/workflows/jeremy-corbyn-current-parliament-early-day-motions-fixture-integration-test.yml \
            fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json \
            scripts/test_jeremy_corbyn_current_parliament_commitments_and_public_positions_v1.py \
            scripts/test_jeremy_corbyn_current_parliament_early_day_motions_fixture_integration_v1.py \
            scripts/test_jeremy_corbyn_current_parliament_spoken_contributions_v1.py | sort)"
          authorised_guard_repair_expected="$(printf '%s\n' \
            .github/workflows/jeremy-corbyn-current-parliament-commitments-public-positions-test.yml \
            .github/workflows/jeremy-corbyn-current-parliament-early-day-motions-fixture-integration-test.yml \
            .github/workflows/jeremy-corbyn-current-parliament-spoken-contributions-test.yml | sort)"
          authorised_oral_question_expected="$(printf '%s\n' \
            .github/workflows/jeremy-corbyn-current-parliament-tabled-oral-questions-fixture-integration-test.yml \
            fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json \
            scripts/test_jeremy_corbyn_current_parliament_tabled_oral_questions_fixture_integration_v1.py | sort)"

          printf '%s\n' "Evaluated PR number: ${PR_NUMBER:-none}"
          printf '%s\n' "Evaluated PR head: ${PR_HEAD_SHA:-none}"
          printf '%s\n' "Evaluated PR base: ${PR_BASE_SHA:-none}"
          printf '%s\n' "Evaluated changed files:"
          printf '%s\n' "$actual"

          if [ "$actual" = "$original_expected" ]; then
            printf '%s\n' "PASS — original spoken-contributions implementation scope"
          elif [ "$PR_NUMBER" = "206" ] \
            && [ "$PR_HEAD_SHA" = "30a8c4dab909cecc244786884360c3d142c9d9ee" ] \
            && [ "$actual" = "$authorised_repair_expected" ]; then
            printf '%s\n' "PASS — authorised PR #206 one-file regression repair scope"
          elif [ "$PR_NUMBER" = "213" ] \
            && [ "$PR_HEAD_SHA" = "21604bac48ab3c5f371d30c0734f7875cf2ea44a" ] \
            && [ "$actual" = "$authorised_repair_expected" ]; then
            printf '%s\n' "PASS — authorised PR #213 populated-position regression repair scope"
          elif [ "$PR_NUMBER" = "204" ] \
            && [ "$PR_HEAD_SHA" = "ca54308f06e5d69831d353e039e71657104945f0" ] \
            && [ "$actual" = "$authorised_pr204_expected" ]; then
            printf '%s\n' "PASS — authorised PR #204 commitments and public positions scope"
          elif [ "$PR_NUMBER" = "220" ] \
            && [ "$actual" = "$authorised_pr220_expected" ]; then
            printf '%s\n' "PASS — authorised PR #220 EDM integration and regression-repair scope"
          elif [ "$PR_BASE_SHA" = "c2cf10d7cda08be9102b1ca37b57db5ed8d6b111" ] \
            && [ "$actual" = "$authorised_guard_repair_expected" ]; then
            printf '%s\n' "PASS — exact-base oral-question workflow-guard repair scope"
          elif [ "$actual" = "$authorised_oral_question_expected" ]; then
            printf '%s\n' "PASS — authorised oral-question fixture-integration scope"
          else
            printf '%s\n' "FAIL — unauthorised spoken-contributions workflow scope"
            exit 1
          fi

          git diff --check origin/main...HEAD
