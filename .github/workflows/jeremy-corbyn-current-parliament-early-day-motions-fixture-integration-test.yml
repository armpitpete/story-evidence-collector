name: Apply Jeremy Corbyn current Parliament EDM fixture integration

on:
  push:
    branches:
      - agent/corbyn-current-parliament-edm-fixture-integration

permissions:
  contents: write

jobs:
  apply-fixture-integration:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out integration branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply and validate deterministic integration
        run: python scripts/test_jeremy_corbyn_current_parliament_early_day_motions_fixture_integration_v1.py --apply

      - name: Commit generated canonical fixture
        shell: bash
        run: |
          set -euo pipefail
          fixture="fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json"
          if git diff --quiet -- "$fixture"; then
            echo "Fixture already integrated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$fixture"
          git commit -m "Integrate Corbyn current-Parliament EDM fixture facts"
          git push
