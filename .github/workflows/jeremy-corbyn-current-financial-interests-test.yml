name: Assemble Corbyn current financial interests baseline

on:
  push:
    branches:
      - agent/corbyn-current-financial-interests-baseline
    paths:
      - ".bootstrap/**"
      - ".github/workflows/jeremy-corbyn-current-financial-interests-test.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".bootstrap/**"
      - ".github/workflows/jeremy-corbyn-current-financial-interests-test.yml"
      - "docs/jeremy-corbyn-current-financial-interests-source-note-v1.md"
      - "scripts/test_jeremy_corbyn_current_financial_interests_v1.py"

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/corbyn-current-financial-interests-baseline
          fetch-depth: 0

      - name: Assemble authorised packet and fixture
        shell: bash
        run: |
          set -euo pipefail
          packet_path="research/complete-mp-reports/jeremy-corbyn/current-financial-interests-v1.json"
          fixture_path="fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json"
          mkdir -p "$(dirname "$packet_path")"
          cat .bootstrap/packet.* > "$packet_path"

          python - <<'PY'
          import json
          from pathlib import Path

          packet_path = Path("research/complete-mp-reports/jeremy-corbyn/current-financial-interests-v1.json")
          fixture_path = Path("fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json")
          packet = json.loads(packet_path.read_text(encoding="utf-8"))
          fixture = json.loads(fixture_path.read_text(encoding="utf-8"))

          assert packet["section_id"] == "financial_interests"
          assert packet["register_snapshot"]["displayed_result_count"] == 29
          assert len(packet["entries"]) == 29
          assert len(packet["facts"]) == 29

          fixture["generated_at"] = packet["captured_at"]
          financial = next(
              section
              for section in fixture["sections"]
              if section["section_id"] == "financial_interests"
          )
          financial.update(
              {
                  "status": "partial",
                  "summary": (
                      "Official UK Parliament records show 29 entries in the current "
                      "published snapshot dated 13 July 2026; historical coverage "
                      "remains incomplete because the current display is subject to "
                      "a twelve-month retention boundary."
                  ),
                  "fact_ids": [fact["fact_id"] for fact in packet["facts"]],
                  "claim_ids": [],
                  "interpretation_ids": [],
                  "relationship_ids": [],
                  "gap_ids": ["gap-financial-interests-history-retention"],
              }
          )

          source_ids = {source["source_id"] for source in fixture["sources"]}
          assert not source_ids.intersection(
              source["source_id"] for source in packet["sources"]
          )
          fixture["sources"].extend(packet["sources"])

          fact_ids = {fact["fact_id"] for fact in fixture["facts"]}
          assert not fact_ids.intersection(fact["fact_id"] for fact in packet["facts"])
          fixture["facts"].extend(packet["facts"])

          replacement = packet["coverage_gaps"][0]
          replaced = False
          gaps = []
          for gap in fixture["coverage_gaps"]:
              if gap["gap_id"] == "gap-financial-interests":
                  gaps.append(replacement)
                  replaced = True
              else:
                  gaps.append(gap)
          assert replaced
          fixture["coverage_gaps"] = gaps

          fixture_path.write_text(
              json.dumps(fixture, ensure_ascii=False, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Validate complete bounded implementation
        run: |
          set -euo pipefail
          python -m py_compile scripts/test_jeremy_corbyn_current_financial_interests_v1.py
          python scripts/test_jeremy_corbyn_current_financial_interests_v1.py
          python scripts/test_jeremy_corbyn_identity_career_v1.py
          python scripts/test_jeremy_corbyn_roles_committees_v1.py
          python scripts/test_complete_mp_report_generator.py
          python scripts/test_complete_mp_portfolio_view.py

      - name: Replace bootstrap with final five-file implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap
          cat > .github/workflows/jeremy-corbyn-current-financial-interests-test.yml <<'YAML'
          name: Jeremy Corbyn current financial interests test

          on:
            pull_request:
              paths:
                - "research/complete-mp-reports/jeremy-corbyn/current-financial-interests-v1.json"
                - "docs/jeremy-corbyn-current-financial-interests-source-note-v1.md"
                - "fixtures/complete-mp-reports/jeremy-corbyn-fixture-v1.json"
                - "scripts/test_jeremy_corbyn_current_financial_interests_v1.py"
                - ".github/workflows/jeremy-corbyn-current-financial-interests-test.yml"
                - "schemas/complete-mp-report-v1.schema.json"
                - "scripts/generate_complete_mp_report.py"
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            test:
              runs-on: ubuntu-latest
              steps:
                - name: Check out repository
                  uses: actions/checkout@v4

                - name: Set up Python 3.12
                  uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"

                - name: Compile financial-interests regression
                  run: python -m py_compile scripts/test_jeremy_corbyn_current_financial_interests_v1.py

                - name: Validate current financial interests baseline
                  run: python scripts/test_jeremy_corbyn_current_financial_interests_v1.py

                - name: Preserve official identity and career baseline
                  run: python scripts/test_jeremy_corbyn_identity_career_v1.py

                - name: Preserve official roles and committees baseline
                  run: python scripts/test_jeremy_corbyn_roles_committees_v1.py

                - name: Preserve canonical Complete MP Report regression
                  run: python scripts/test_complete_mp_report_generator.py

                - name: Preserve read-only Complete MP Portfolio view
                  run: python scripts/test_complete_mp_portfolio_view.py
          YAML

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete Corbyn current financial interests baseline"
          git push origin HEAD:agent/corbyn-current-financial-interests-baseline
