name: MP historic source inspection test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-mp-historic-source-inspection:
    name: Run MP historic source inspection
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run MP historic source inspection
        run: python inspect_mp_historic_vote_source_v14.py

      - name: Upload MP historic source inspection report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mp-historic-source-inspection-report
          path: |
            mp_historic_vote_source_candidates_v14.json
            mp_historic_vote_source_report_v14.json
            mp_historic_vote_source_report_v14.md
          if-no-files-found: warn
